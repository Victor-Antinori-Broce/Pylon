# ═══════════════════════════════════════════════════════════════════════════
# GremiusCMS — PRODUCCIÓN Completa
#
# 🚀 USO: docker compose up -d
#
# Este archivo levanta TODO el sistema listo para producción:
#   - Infraestructura (PostgreSQL, MinIO, Valkey)
#   - API (Bun + Hono)
#   - Web Frontend
#   - Admin Panel
#
# Una vez levantado, accede a:
#   • Panel Admin: http://localhost:3001/admin
#   • API Docs:    http://localhost:3000/docs
#   • Web:         http://localhost:3001
#
# ═══════════════════════════════════════════════════════════════════════════

services:

  # ═══════════════════════════════════════════════════════════════════════
  # PostgreSQL 16 con pgvector
  # ═══════════════════════════════════════════════════════════════════════
  gremius_db:
    image: pgvector/pgvector:pg16
    container_name: gremius_db_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-gremius}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gremiuspassword}
      POSTGRES_DB: ${POSTGRES_DB:-gremius_prod}
    volumes:
      - gremius_postgres_prod:/var/lib/postgresql/data
      - ./docker/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-gremius} -d ${POSTGRES_DB:-gremius_prod}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gremius_net_prod

  # ═══════════════════════════════════════════════════════════════════════
  # MinIO (S3-compatible storage)
  # ═══════════════════════════════════════════════════════════════════════
  gremius_minio:
    image: minio/minio:latest
    container_name: gremius_minio_prod
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-gremius_minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-gremius_minio_secret_2025}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - gremius_minio_prod:/data
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gremius_net_prod

  # ═══════════════════════════════════════════════════════════════════════
  # Valkey (Redis-compatible cache)
  # ═══════════════════════════════════════════════════════════════════════
  gremius_cache:
    image: valkey/valkey:7-alpine
    container_name: gremius_cache_prod
    restart: unless-stopped
    command: valkey-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "valkey-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - gremius_net_prod

  # ═══════════════════════════════════════════════════════════════════════
  # API - Backend (Bun + Hono)
  # ═══════════════════════════════════════════════════════════════════════
  gremius_api:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
      target: api
    container_name: gremius_api_prod
    restart: unless-stopped
    depends_on:
      gremius_db:
        condition: service_healthy
      gremius_minio:
        condition: service_healthy
      gremius_cache:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gremius}:${POSTGRES_PASSWORD:-gremiuspassword}@gremius_db_prod:5432/${POSTGRES_DB:-gremius_prod}
      - REDIS_URL=redis://gremius_cache_prod:6379
      - S3_ENDPOINT=http://gremius_minio_prod:9000
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-gremius_minio}
      - S3_SECRET_KEY=${S3_SECRET_KEY:-gremius_minio_secret_2025}
      - S3_BUCKET=${S3_BUCKET:-gremius-uploads}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-change-me-in-production}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3000}
    ports:
      - "${API_PORT:-3000}:3000"
    networks:
      - gremius_net_prod
    # Comando que ejecuta migraciones seguras y luego inicia
    command: ["sh", "-c", "echo 'Running migrations...' && bun run db:migrate && echo 'Starting API...' && bun run start"]

  # ═══════════════════════════════════════════════════════════════════════
  # Admin Panel - Frontend
  # ═══════════════════════════════════════════════════════════════════════
  gremius_admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.prod
      target: admin
      args:
        - PUBLIC_API_URL=http://localhost:3000
    container_name: gremius_admin_prod
    restart: unless-stopped
    depends_on:
      - gremius_api
    ports:
      - "5173:80"
    networks:
      - gremius_net_prod

volumes:
  gremius_postgres_prod:
    name: gremius_postgres_prod
    driver: local

  gremius_minio_prod:
    name: gremius_minio_prod
    driver: local

networks:
  gremius_net_prod:
    name: gremius_net_prod
    driver: bridge
